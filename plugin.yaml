name: codex-websocket
version: 1.0.0
description: Delegate coding tasks to OpenAI Codex via app-server WebSocket bridge (pydantic-typed)
provides_tools:
  - codex_task
  - codex_revive

# Python dependencies
python_dependencies:
  - websockets>=11.0
  - pydantic>=2.0

# System dependencies (must be in PATH)
system_dependencies:
  - name: codex
    description: OpenAI Codex CLI
    check_command: codex --version

# Environment variables (optional)
env_vars:
  - name: RUST_LOG
    description: Log level for codex app-server
    default: codex_app_server=debug,codex_core=info
